openapi: 3.0.0
info:
  title: Employee Management System API
  version: 1.0.0
  description: Comprehensive REST API for managing employee records with pagination, filtering, and searching capabilities
  contact:
    name: EMS Support
    email: support@example.com
  license:
    name: Proprietary
    url: https://example.com/license

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: CRUD Operations
    description: Basic Create, Read, Update, Delete operations
  - name: Pagination
    description: Paginated endpoints for retrieving employees
  - name: Search
    description: Search and filter employees

paths:
  /api/employees:

    post:
      summary: Create a new employee
      description: Create a new employee record
      operationId: createEmployee
      tags:
        - CRUD Operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeInput'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/employees/{id}:
    get:
      summary: Get employee by ID
      description: Retrieve a specific employee by their ID
      operationId: getEmployeeById
      tags:
        - CRUD Operations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Employee ID
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update employee
      description: Update an existing employee record
      operationId: updateEmployee
      tags:
        - CRUD Operations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Employee ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeInput'
      responses:
        '200':
          description: Employee updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete employee
      description: Delete an employee record
      operationId: deleteEmployee
      tags:
        - CRUD Operations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Employee ID
      responses:
        '204':
          description: Employee deleted successfully
        '404':
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/employees/paginated/all:
    get:
      summary: Get all employees with pagination
      description: Retrieve all employees with pagination support
      operationId: getAllEmployeesWithPagination
      tags:
        - Pagination
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated employee list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedEmployeeResponse'



  /api/employees/paginated/search/advanced:
    get:
      summary: Advanced search with multiple criteria
      description: Advanced search with optional multiple criteria (department, designation, salary range)
      operationId: searchEmployeesByMultipleCriteria
      tags:
        - Search
      parameters:
        - name: dept
          in: query
          required: false
          schema:
            type: string
          description: Department name (optional)
        - name: designation
          in: query
          required: false
          schema:
            type: string
          description: Job designation (optional)
        - name: minSalary
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Minimum salary (optional)
        - name: maxSalary
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Maximum salary (optional)
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedEmployeeResponse'


components:
  schemas:
    Employee:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Employee ID
          example: 1
        name:
          type: string
          description: Employee name
          maxLength: 100
          example: Alice Johnson
        email:
          type: string
          format: email
          description: Employee email
          maxLength: 100
          example: alice.johnson@example.com
        dept:
          type: string
          description: Department
          maxLength: 50
          example: IT
        designation:
          type: string
          description: Job designation
          maxLength: 100
          example: Developer
        salary:
          type: number
          format: double
          description: Salary
          example: 60000.0
        supervisor:
          type: string
          description: Supervisor name
          maxLength: 100
          example: John Smith
        address:
          type: string
          description: Address
          maxLength: 255
          example: 123 Main St
        doj:
          type: string
          description: Date of Joining
          maxLength: 50
          example: "2023-01-15"

    EmployeeInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
          example: Alice Johnson
        email:
          type: string
          format: email
          maxLength: 100
          example: alice.johnson@example.com
        dept:
          type: string
          maxLength: 50
          example: IT
        designation:
          type: string
          maxLength: 100
          example: Developer
        salary:
          type: number
          format: double
          example: 60000.0
        supervisor:
          type: string
          maxLength: 100
          example: John Smith
        address:
          type: string
          maxLength: 255
          example: 123 Main St
        doj:
          type: string
          maxLength: 50
          example: "2023-01-15"

    PagedEmployeeResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
          description: Array of employees
        pageable:
          $ref: '#/components/schemas/Pageable'
        last:
          type: boolean
          description: Whether this is the last page
          example: false
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
          example: 100
        totalPages:
          type: integer
          description: Total number of pages
          example: 10
        size:
          type: integer
          description: Page size
          example: 10
        number:
          type: integer
          description: Current page number
          example: 0
        numberOfElements:
          type: integer
          description: Number of elements on current page
          example: 10
        first:
          type: boolean
          description: Whether this is the first page
          example: true
        empty:
          type: boolean
          description: Whether the response is empty
          example: false

    Pageable:
      type: object
      properties:
        sort:
          $ref: '#/components/schemas/Sort'
        pageNumber:
          type: integer
          example: 0
        pageSize:
          type: integer
          example: 10
        offset:
          type: integer
          format: int64
          example: 0
        paged:
          type: boolean
          example: true
        unpaged:
          type: boolean
          example: false

    Sort:
      type: object
      properties:
        empty:
          type: boolean
          example: false
        sorted:
          type: boolean
          example: true
        unsorted:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-02-25T10:30:00.000+00:00"
        status:
          type: integer
          example: 404
        error:
          type: string
          example: "Not Found"
        message:
          type: string
          example: "Employee not found with id: 999"
        path:
          type: string
          example: "/api/employees/999"

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Zero-indexed page number

    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Number of records per page

    SortParam:
      name: sort
      in: query
      schema:
        type: string
      description: Sort criteria (e.g., name,asc or salary,desc)
      example: "salary,desc"


