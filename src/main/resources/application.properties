spring.datasource.url=jdbc:h2:mem:ems;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# show sql for debugging
spring.jpa.show-sql=true

# Ensure proper initialization order - create schema before loading data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationWithMinimum32CharactersLongEnough
jwt.expiration=86400000

# Logging
logging.level.com.ems=DEBUG
logging.level.com.ems.security=DEBUG

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.use-root-path=true
springdoc.show-actuator=false


